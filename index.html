<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>算算你的本命字体｜Destiny Font Test</title>
  <style>
    :root{
      --bg1:#f8f4ee;
      --bg2:#efe8ff;
      --ink:#221d1a;
      --sub:#6a625b;
      --gold:#cba56c;
      --purple:#7b5cff;
      --line:rgba(34,29,26,.10);
      --card:#ffffffcc;
      --shadow:0 18px 50px rgba(38,22,73,.12);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      color:var(--ink);
      font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(123,92,255,.10), transparent 28%),
        radial-gradient(circle at 80% 0%, rgba(203,165,108,.10), transparent 25%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      min-height:100vh;
    }
    .wrap{
      max-width:940px;
      margin:0 auto;
      padding:28px 16px 60px;
    }
    .hero{
      text-align:center;
      margin-bottom:24px;
    }
    .badge{
      display:inline-block;
      padding:7px 12px;
      border:1px solid var(--line);
      border-radius:999px;
      font-size:12px;
      color:var(--sub);
      background:rgba(255,255,255,.55);
      letter-spacing:.08em;
      margin-bottom:12px;
    }
    h1{
      margin:0;
      font-size:clamp(34px,5vw,56px);
      line-height:1.08;
      letter-spacing:-.03em;
    }
    .subtitle{
      max-width:720px;
      margin:14px auto 0;
      color:var(--sub);
      line-height:1.9;
      font-size:16px;
    }

    .panel{
      background:var(--card);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.7);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
    }

    .progress-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:14px;
      color:var(--sub);
      margin-bottom:10px;
    }
    .bar{
      height:10px;
      background:rgba(123,92,255,.10);
      border-radius:999px;
      overflow:hidden;
      margin-bottom:18px;
    }
    .fill{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--purple),#b79dff);
      transition:width .35s ease;
    }

    .q-no{
      color:var(--purple);
      font-size:13px;
      font-weight:700;
      letter-spacing:.08em;
      margin-bottom:8px;
    }
    .q-title{
      margin:0 0 18px;
      font-size:clamp(24px,3.4vw,36px);
      line-height:1.38;
    }
    .options{
      display:grid;
      gap:14px;
    }
    .option{
      padding:18px;
      border-radius:20px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      transition:.18s ease;
    }
    .option:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 25px rgba(0,0,0,.06);
      border-color:rgba(123,92,255,.30);
    }
    .opt-label{
      font-size:12px;
      color:var(--sub);
      margin-bottom:8px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .opt-text{
      font-size:18px;
      line-height:1.7;
      font-weight:600;
    }
    .tip{
      margin-top:16px;
      color:var(--sub);
      font-size:14px;
    }

    .result{
      display:none;
      margin-top:24px;
    }

    .reveal{
      text-align:center;
      color:var(--sub);
      font-size:14px;
      margin-bottom:14px;
      letter-spacing:.06em;
    }

    .stage{
      perspective:1400px;
    }

    .flip-card{
      position:relative;
      width:100%;
      min-height:720px;
      transform-style:preserve-3d;
      transition:transform 1s cubic-bezier(.2,.7,.2,1);
    }
    .flip-card.flipped{
      transform:rotateY(180deg);
    }

    .face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius:28px;
      overflow:hidden;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.65);
    }

    .front{
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.25), transparent 30%),
        linear-gradient(180deg,#2d2140,#12101b);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:26px;
    }
    .front-inner{
      width:min(420px, 100%);
      aspect-ratio: 3 / 5;
      border-radius:24px;
      border:1px solid rgba(203,165,108,.45);
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        radial-gradient(circle at 50% 30%, rgba(203,165,108,.15), transparent 20%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#f5ecdf;
      box-shadow: inset 0 0 0 2px rgba(203,165,108,.08);
      position:relative;
      overflow:hidden;
    }
    .front-inner:before,
    .front-inner:after{
      content:"✦";
      position:absolute;
      color:rgba(203,165,108,.65);
      font-size:22px;
    }
    .front-inner:before{top:18px;left:18px}
    .front-inner:after{bottom:18px;right:18px}
    .front-title{
      font-size:14px;
      letter-spacing:.22em;
      color:#d7c0a0;
      margin-bottom:14px;
    }
    .front-name{
      font-size:36px;
      font-weight:800;
      margin-bottom:14px;
    }
    .front-desc{
      max-width:260px;
      line-height:1.9;
      font-size:15px;
      color:#d8d0c6;
    }

    .back{
      transform:rotateY(180deg);
      background:#fff;
      display:grid;
      grid-template-rows:auto 1fr auto;
    }

    .visual{
      position:relative;
      min-height:460px;
      background:#ddd;
    }
    .visual img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .visual:after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.30));
    }
    .overlay{
      position:absolute;
      left:20px;
      right:20px;
      bottom:20px;
      z-index:2;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(10px);
      border-radius:20px;
      border:1px solid rgba(255,255,255,.55);
      padding:18px;
    }
    .en{
      font-size:12px;
      color:var(--sub);
      letter-spacing:.14em;
      margin-bottom:6px;
    }
    .name{
      margin:0 0 10px;
      font-size:clamp(28px,4vw,44px);
      line-height:1.08;
    }
    .tags{
      color:var(--sub);
      font-size:15px;
      margin-bottom:10px;
    }
    .desc{
      margin:0;
      font-size:18px;
      line-height:1.8;
    }

    .body{
      padding:22px;
      display:grid;
      gap:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.90), rgba(250,247,255,1));
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .box{
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      background:#fff;
    }
    .box-title{
      font-size:12px;
      color:var(--sub);
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    .box-main{
      font-size:22px;
      font-weight:800;
      line-height:1.45;
      margin-bottom:8px;
    }
    .box-text{
      color:var(--sub);
      line-height:1.8;
      font-size:15px;
    }

    .score-list{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:8px;
    }
    .score-item{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      background:#fff;
      font-size:14px;
      line-height:1.7;
    }

    .share{
      white-space:pre-wrap;
      color:var(--sub);
      font-size:15px;
      line-height:1.85;
      background:rgba(123,92,255,.04);
      border:1px dashed rgba(123,92,255,.24);
      border-radius:16px;
      padding:14px;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    button{
      border:none;
      border-radius:999px;
      padding:14px 20px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:.18s ease;
    }
    button:hover{transform:translateY(-1px)}
    .primary{
      background:linear-gradient(90deg,var(--purple),#a98cff);
      color:#fff;
    }
    .secondary{
      background:rgba(34,29,26,.08);
      color:var(--ink);
    }

    @media (max-width:768px){
      .panel{padding:20px}
      .flip-card{min-height:820px}
      .visual{min-height:420px}
      .grid,.score-list{grid-template-columns:1fr}
      .actions{flex-direction:column}
      button{width:100%}
      .front-inner{width:min(320px, 100%)}
      .front-name{font-size:30px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="badge">DESTINY FONT TEST</div>
      <h1>算算你的本命字体</h1>
      <div class="subtitle">
        每个人都有一张属于自己的字体人格卡。<br>
        完成 6 道题，抽取你的本命字体，并揭晓隐藏副人格。
      </div>
    </div>

    <div class="panel" id="quizPanel">
      <div class="progress-top">
        <span id="progressText">第 1 / 6 题</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="bar"><div class="fill" id="progressFill"></div></div>

      <div id="questionBox"></div>
      <div class="tip">请选择更接近你的选项。没有标准答案，只有更像你的气质。</div>
    </div>

    <div class="result" id="resultSection">
      <div class="reveal" id="revealText">正在揭晓你的本命字体……</div>

      <div class="stage">
        <div class="flip-card" id="flipCard">
          <div class="face front">
            <div class="front-inner">
              <div class="front-title">YOUR DESTINY FONT</div>
              <div class="front-name">命运卡牌</div>
              <div class="front-desc">请稍等片刻，翻开这张卡，看看你最像哪一种字体人格。</div>
            </div>
          </div>

          <div class="face back">
            <div class="visual">
              <img id="resultImage" src="" alt="结果图片">
              <div class="overlay">
                <div class="en" id="resultEn"></div>
                <h2 class="name" id="resultName"></h2>
                <div class="tags" id="resultTags"></div>
                <p class="desc" id="resultDesc"></p>
              </div>
            </div>

            <div class="body">
              <div class="grid">
                <div class="box">
                  <div class="box-title">副人格</div>
                  <div class="box-main" id="subName">—</div>
                  <div class="box-text" id="subDesc">—</div>
                </div>
                <div class="box">
                  <div class="box-title">一句短评</div>
                  <div class="box-text" id="shortComment">—</div>
                </div>
              </div>

              <div class="box">
                <div class="box-title">得分分布</div>
                <div class="score-list" id="scoreList"></div>
              </div>

              <div class="box">
                <div class="box-title">分享文案</div>
                <div class="share" id="shareText"></div>
              </div>

              <div class="actions">
                <button class="primary" onclick="copyShare()">复制测试结果</button>
                <button class="secondary" onclick="copyLink()">复制网页链接</button>
                <button class="secondary" onclick="restartQuiz()">重新抽卡</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const questions = [
      {
        title: "看到一个新项目时，你的第一反应更接近哪一种？",
        options: [
          { label: "A", text: "先拆解结构，搞清目标和路径。", add: { sans: 2 } },
          { label: "B", text: "先感受气质，想象它最终会长成什么样。", add: { serif: 2 } }
        ]
      },
      {
        title: "面对不确定性，你更常用哪种方式应对？",
        options: [
          { label: "A", text: "建立规则和边界，让事情先稳定下来。", add: { slab: 2 } },
          { label: "B", text: "边走边调，快速适应新的变量。", add: { variable: 2 } }
        ]
      },
      {
        title: "在社交场合里，你更容易呈现哪一面？",
        options: [
          { label: "A", text: "细腻、真诚，愿意表达感受。", add: { script: 2 } },
          { label: "B", text: "有存在感，容易被人一眼记住。", add: { display: 2 } }
        ]
      },
      {
        title: "你更认同哪种审美判断？",
        options: [
          { label: "A", text: "越清晰越高级，少即是多。", add: { sans: 2 } },
          { label: "B", text: "层次和细节会让表达更有韵味。", add: { serif: 2 } }
        ]
      },
      {
        title: "别人最容易因为什么而信任你？",
        options: [
          { label: "A", text: "我很稳，能扛事，也能把事情落地。", add: { slab: 2 } },
          { label: "B", text: "我有弹性，能快速切换角色和状态。", add: { variable: 2 } }
        ]
      },
      {
        title: "如果你要给自己选一种外放方式，你更接近哪种？",
        options: [
          { label: "A", text: "把真实情绪和个性流动地表达出来。", add: { script: 2 } },
          { label: "B", text: "用强烈风格和记忆点让人印象深刻。", add: { display: 2 } }
        ]
      }
    ];

    const results = {
      serif: {
        en: "SERIF",
        name: "叙事型人格",
        tags: "信任 / 深度 / 情绪",
        desc: "你是 Serif，克制之下藏着丰富的感受力。你在意细节、语气、层次，也相信真正动人的表达需要时间沉淀。",
        short: "你偏爱有故事感的表达，也更容易被记忆、文化和细腻情绪打动。",
        image: "https://transsion-plattech-1219.oss-accelerate.aliyuncs.com/tranai-assets/ee26a13f2eb8412eb118ce86122018b0.jpeg"
      },
      sans: {
        en: "SANS SERIF",
        name: "系统型人格",
        tags: "清晰 / 理性 / 控制",
        desc: "你是 Sans Serif，擅长从复杂里提炼核心。你的判断通常清醒直接，喜欢秩序，也能把事情迅速推进。",
        short: "你对结构、效率和清晰表达有天然偏好，是典型的整理者与推进者。",
        image: "https://transsion-plattech-1219.oss-accelerate.aliyuncs.com/tranai-assets/3a967ecbfa504056a16a5471477613ca.jpeg"
      },
      slab: {
        en: "SLAB SERIF",
        name: "稳定型人格",
        tags: "可靠 / 抗压 / 现实",
        desc: "你是 Slab Serif，不一定最张扬，但总是最让人放心。你擅长给混乱建立秩序，也能把想法真正落到地上。",
        short: "你给人的感觉稳、准、能扛压，是那种关键时刻很值得依靠的人。",
        image: "https://transsion-plattech-1219.oss-accelerate.aliyuncs.com/tranai-assets/65e1ca4ce1ce46628c2a44a91368cb34.jpeg"
      },
      script: {
        en: "SCRIPT",
        name: "情绪型人格",
        tags: "感性 / 表达 / 流动",
        desc: "你是 Script，感受比规则更先发生。你重视情绪的真实流动，也擅长把难以言说的细微感受传递给别人。",
        short: "你拥有细腻、感性和高表达力，情绪既是你的敏感点，也是你的能量来源。",
        image: "https://transsion-platform01.oss-accelerate.aliyuncs.com/tranai-assets/321e38bec0244740a87af0cf1df937b4.jpeg"
      },
      display: {
        en: "DISPLAY",
        name: "舞台型人格",
        tags: "表现 / 张力 / 存在感",
        desc: "你是 Display，自带高识别度。你知道如何呈现自己，也懂得风格本身就是一种强有力的表达。",
        short: "你有鲜明的个人气场，通常不需要解释太多，就已经足够吸引目光。",
        image: "https://transsion-platform01.oss-accelerate.aliyuncs.com/tranai-assets/25f97bad57e1455e8fda11b229cea39d.jpeg"
      },
      variable: {
        en: "VARIABLE FONT",
        name: "进化型人格（AI型）",
        tags: "变化 / 适应 / 多面",
        desc: "你是 Variable Font，你不会被单一定义束缚。你擅长根据环境快速调整自己，在变化中持续进化，找到最合适的表达方式。",
        short: "你是典型的适应型、多线程型人格，灵活、开放，也最接近未来感。",
        image: "https://transsion-platform01.oss-accelerate.aliyuncs.com/tranai-assets/88bda60aadef42918eb4f1faee4f2e6c.jpeg"
      }
    };

    const priority = ["variable","serif","sans","slab","script","display"];
    let current = 0;
    let scores = {};

    function initScores(){
      scores = {
        serif:0,
        sans:0,
        slab:0,
        script:0,
        display:0,
        variable:0
      };
    }

    function updateProgress(){
      const percent = Math.round((current / questions.length) * 100);
      document.getElementById("progressFill").style.width = percent + "%";
      document.getElementById("progressPercent").textContent = percent + "%";
      document.getElementById("progressText").textContent = `第 ${Math.min(current + 1, questions.length)} / ${questions.length} 题`;
    }

    function renderQuestion(){
      updateProgress();
      const q = questions[current];
      document.getElementById("questionBox").innerHTML = `
        <div class="q-no">Q${current + 1}</div>
        <h2 class="q-title">${q.title}</h2>
        <div class="options">
          ${q.options.map((opt, i) => `
            <div class="option" onclick="selectOption(${i})">
              <div class="opt-label">选项 ${opt.label}</div>
              <div class="opt-text">${opt.text}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function selectOption(index){
      const selected = questions[current].options[index];
      Object.keys(selected.add).forEach(key => {
        scores[key] += selected.add[key];
      });
      current++;
      if(current < questions.length){
        renderQuestion();
      } else {
        revealResult();
      }
    }

    function getSortedResults(){
      return Object.keys(scores).sort((a,b)=>{
        if(scores[b] !== scores[a]) return scores[b] - scores[a];
        return priority.indexOf(a) - priority.indexOf(b);
      });
    }

    function revealResult(){
      document.getElementById("quizPanel").style.display = "none";
      document.getElementById("resultSection").style.display = "block";

      const sorted = getSortedResults();
      const topKey = sorted[0];
      const subKey = sorted[1];
      const top = results[topKey];
      const sub = results[subKey];

      document.getElementById("resultImage").src = top.image;
      document.getElementById("resultEn").textContent = top.en;
      document.getElementById("resultName").textContent = top.name;
      document.getElementById("resultTags").textContent = top.tags;
      document.getElementById("resultDesc").textContent = top.desc;

      document.getElementById("subName").textContent = `${sub.en}｜${sub.name}`;
      document.getElementById("subDesc").textContent = sub.short;

      document.getElementById("shortComment").textContent =
        `你的主人格偏向「${top.name}」，说明你最核心的气质更接近 ${top.tags.replaceAll("/", " / ")}；而副人格「${sub.name}」让你在不同情境下拥有更丰富、更立体的表达层次。`;

      document.getElementById("scoreList").innerHTML = sorted.map(key => {
        return `<div class="score-item"><strong>${results[key].en}</strong><br>${results[key].name}：${scores[key]} 分</div>`;
      }).join("");

      const share = `我抽到的本命字体是【${top.en}｜${top.name}】！
关键词：${top.tags}
${top.desc}

我的隐藏副人格是【${sub.en}｜${sub.name}】。
来测测你的本命字体：
${window.location.href}`;

      document.getElementById("shareText").textContent = share;

      setTimeout(() => {
        document.getElementById("revealText").textContent = "你的本命字体已揭晓";
        document.getElementById("flipCard").classList.add("flipped");
      }, 700);

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function restartQuiz(){
      current = 0;
      initScores();
      document.getElementById("quizPanel").style.display = "block";
      document.getElementById("resultSection").style.display = "none";
      document.getElementById("flipCard").classList.remove("flipped");
      document.getElementById("revealText").textContent = "正在揭晓你的本命字体……";
      renderQuestion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function copyShare(){
      navigator.clipboard.writeText(document.getElementById("shareText").textContent).then(()=>{
        alert("测试结果已复制");
      }).catch(()=>{
        alert("复制失败，请手动复制");
      });
    }

    function copyLink(){
      navigator.clipboard.writeText(window.location.href).then(()=>{
