<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>测测你的本命字体</title>
  <style>
    :root{
      --bg1:#f8f4ee;
      --bg2:#efe8ff;
      --ink:#221d1a;
      --sub:#6a625b;
      --gold:#cba56c;
      --purple:#7b5cff;
      --line:rgba(34,29,26,.10);
      --card:#ffffffcc;
      --shadow:0 18px 50px rgba(38,22,73,.12);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      color:var(--ink);
      font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(123,92,255,.10), transparent 28%),
        radial-gradient(circle at 80% 0%, rgba(203,165,108,.10), transparent 25%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      min-height:100vh;
    }
    .wrap{
      max-width:940px;
      margin:0 auto;
      padding:28px 16px 60px;
    }
    .hero{
      text-align:center;
      margin-bottom:24px;
    }
    .badge{
      display:inline-block;
      padding:7px 12px;
      border:1px solid var(--line);
      border-radius:999px;
      font-size:12px;
      color:var(--sub);
      background:rgba(255,255,255,.55);
      letter-spacing:.08em;
      margin-bottom:12px;
    }
    h1{
      margin:0;
      font-size:clamp(34px,5vw,56px);
      line-height:1.08;
      letter-spacing:-.03em;
    }
    .subtitle{
      max-width:760px;
      margin:14px auto 0;
      color:var(--sub);
      line-height:1.9;
      font-size:16px;
    }

    .panel{
      background:var(--card);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.7);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
    }

    .progress-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:14px;
      color:var(--sub);
      margin-bottom:10px;
    }
    .bar{
      height:10px;
      background:rgba(123,92,255,.10);
      border-radius:999px;
      overflow:hidden;
      margin-bottom:18px;
    }
    .fill{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--purple),#b79dff);
      transition:width .35s ease;
    }

    .q-no{
      color:var(--purple);
      font-size:13px;
      font-weight:700;
      letter-spacing:.08em;
      margin-bottom:8px;
    }
    .q-title{
      margin:0 0 18px;
      font-size:clamp(24px,3.4vw,36px);
      line-height:1.38;
    }
    .options{
      display:grid;
      gap:14px;
    }
    .option{
      padding:18px;
      border-radius:20px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      transition:.18s ease;
    }
    .option:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 25px rgba(0,0,0,.06);
      border-color:rgba(123,92,255,.30);
    }
    .opt-label{
      font-size:12px;
      color:var(--sub);
      margin-bottom:8px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .opt-text{
      font-size:18px;
      line-height:1.7;
      font-weight:600;
    }
    .tip{
      margin-top:16px;
      color:var(--sub);
      font-size:14px;
    }

    .result{
      display:none;
      margin-top:24px;
    }

    .reveal{
      text-align:center;
      color:var(--sub);
      font-size:14px;
      margin-bottom:14px;
      letter-spacing:.06em;
    }

    .stage{
      perspective:1400px;
    }

    .flip-card{
      position:relative;
      width:100%;
      min-height:980px;
      transform-style:preserve-3d;
      transition:transform 1s cubic-bezier(.2,.7,.2,1);
    }
    .flip-card.flipped{
      transform:rotateY(180deg);
    }

    .face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius:28px;
      overflow:hidden;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.65);
    }

    .front{
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.25), transparent 30%),
        linear-gradient(180deg,#2d2140,#12101b);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:26px;
    }
    .front-inner{
      width:min(420px, 100%);
      aspect-ratio: 3 / 5;
      border-radius:24px;
      border:1px solid rgba(203,165,108,.45);
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        radial-gradient(circle at 50% 30%, rgba(203,165,108,.15), transparent 20%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#f5ecdf;
      box-shadow: inset 0 0 0 2px rgba(203,165,108,.08);
      position:relative;
      overflow:hidden;
    }
    .front-inner:before,
    .front-inner:after{
      content:"✦";
      position:absolute;
      color:rgba(203,165,108,.65);
      font-size:22px;
    }
    .front-inner:before{top:18px;left:18px}
    .front-inner:after{bottom:18px;right:18px}
    .front-title{
      font-size:14px;
      letter-spacing:.22em;
      color:#d7c0a0;
      margin-bottom:14px;
    }
    .front-name{
      font-size:36px;
      font-weight:800;
      margin-bottom:14px;
    }
    .front-desc{
      max-width:260px;
      line-height:1.9;
      font-size:15px;
      color:#d8d0c6;
    }

    .back{
      transform:rotateY(180deg);
      background:#fff;
      display:grid;
      grid-template-rows:auto 1fr auto;
    }

    .visual{
      position:relative;
      min-height:460px;
      background:#ddd;
    }
    .visual img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .visual:after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.30));
    }
    .overlay{
      position:absolute;
      left:20px;
      right:20px;
      bottom:20px;
      z-index:2;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(10px);
      border-radius:20px;
      border:1px solid rgba(255,255,255,.55);
      padding:18px;
    }
    .en{
      font-size:12px;
      color:var(--sub);
      letter-spacing:.14em;
      margin-bottom:6px;
    }
    .name{
      margin:0 0 10px;
      font-size:clamp(28px,4vw,44px);
      line-height:1.08;
    }
    .tags{
      color:var(--sub);
      font-size:15px;
      margin-bottom:10px;
    }
    .desc{
      margin:0;
      font-size:18px;
      line-height:1.8;
    }

    .body{
      padding:22px;
      display:grid;
      gap:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.90), rgba(250,247,255,1));
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .box{
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      background:#fff;
    }
    .box-title{
      font-size:12px;
      color:var(--sub);
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    .box-main{
      font-size:22px;
      font-weight:800;
      line-height:1.45;
      margin-bottom:8px;
    }
    .box-text{
      color:var(--sub);
      line-height:1.8;
      font-size:15px;
    }

    .score-list{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:8px;
    }
    .score-item{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      background:#fff;
      font-size:14px;
      line-height:1.7;
    }

    .share{
      white-space:pre-wrap;
      color:var(--sub);
      font-size:15px;
      line-height:1.85;
      background:rgba(123,92,255,.04);
      border:1px dashed rgba(123,92,255,.24);
      border-radius:16px;
      padding:14px;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    button{
      border:none;
      border-radius:999px;
      padding:14px 20px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:.18s ease;
    }
    button:hover{transform:translateY(-1px)}
    .primary{
      background:linear-gradient(90deg,var(--purple),#a98cff);
      color:#fff;
    }
    .secondary{
      background:rgba(34,29,26,.08);
      color:var(--ink);
    }

    @media (max-width:768px){
      .panel{padding:20px}
      .flip-card{min-height:1160px}
      .visual{min-height:420px}
      .grid,.score-list{grid-template-columns:1fr}
      .actions{flex-direction:column}
      button{width:100%}
      .front-inner{width:min(320px, 100%)}
      .front-name{font-size:30px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="badge">DESTINY FONT TEST</div>
      <h1>测测你的本命字体</h1>
      <div class="subtitle">
        如果你是一种字体，你会出现在谁的海报、哪种屏幕、什么样的标题里？<br>
        完成 6 道有趣选择，测出你的本命字体、隐藏倾向，以及 AI 最可能推荐给你的第二字体。
      </div>
    </div>

    <div class="panel" id="quizPanel">
      <div class="progress-top">
        <span id="progressText">第 1 / 6 题</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="bar"><div class="fill" id="progressFill"></div></div>

      <div id="questionBox"></div>
      <div class="tip">请选择更接近你的选项。没有标准答案，只有更像你的字体气质。</div>
    </div>

    <div class="result" id="resultSection">
      <div class="reveal" id="revealText">正在揭晓你的本命字体……</div>

      <div class="stage">
        <div class="flip-card" id="flipCard">
          <div class="face front">
            <div class="front-inner">
              <div class="front-title">YOUR DESTINY FONT</div>
              <div class="front-name">命运卡牌</div>
              <div class="front-desc">请稍等片刻，翻开这张卡，看看你的本命字体会是哪一种。</div>
            </div>
          </div>

          <div class="face back">
            <div class="visual">
              <img id="resultImage" src="" alt="结果图片">
              <div class="overlay">
                <div class="en" id="resultEn"></div>
                <h2 class="name" id="resultName"></h2>
                <div class="tags" id="resultTags"></div>
                <p class="desc" id="resultDesc"></p>
              </div>
            </div>

            <div class="body">
              <div class="grid">
                <div class="box">
                  <div class="box-title">隐藏倾向</div>
                  <div class="box-main" id="subName">—</div>
                  <div class="box-text" id="subDesc">—</div>
                </div>
                <div class="box">
                  <div class="box-title">一句短评</div>
                  <div class="box-text" id="shortComment">—</div>
                </div>
              </div>

              <div class="box">
                <div class="box-title">AI影响度</div>
                <div class="box-main" id="aiLevel">—</div>
                <div class="box-text" id="aiDesc">—</div>
              </div>

              <div class="box">
                <div class="box-title">你会出现在哪种设计场景</div>
                <div class="box-main" id="sceneName">—</div>
                <div class="box-text" id="sceneDesc">—</div>
              </div>

              <div class="box">
                <div class="box-title">AI推荐给你的第二字体</div>
                <div class="box-main" id="aiFontName">—</div>
                <div class="box-text" id="aiFontDesc">—</div>
              </div>

              <div class="box">
                <div class="box-title">得分分布</div>
                <div class="score-list" id="scoreList"></div>
              </div>

              <div class="box">
                <div class="box-title">分享文案</div>
                <div class="share" id="shareText"></div>
              </div>

              <div class="actions">
                <button class="primary" onclick="copyShare()">复制我的字体卡</button>
                <button class="secondary" onclick="copyLink()">分享这张测试</button>
                <button class="secondary" onclick="restartQuiz()">重新测一次</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const questions = [
      {
        title: "如果你要把自己变成一张海报标题，你更想被看成哪一种？",
        options: [
          { label: "A", text: "干净、冷静、一下就能读懂，像高质感品牌首页。", add: { sans: 2 }, ai: 2 },
          { label: "B", text: "有故事感和细节，像一本会被认真翻阅的书封。", add: { serif: 2 }, ai: 0 }
        ]
      },

        title: "如果别人只允许你用一种字体形容自己，你更希望是哪种状态？",
        options: [
          { label: "A", text: "稳得住场面，像一句写在招牌上的承诺。", add: { slab: 2 }, ai: 0 },

        title: "如果你要替一个品牌传递“值得相信”，你会选哪种字感？",

        ]
      }
    ];

    const results = {
      serif: {

        name: "故事衬线体",
        tags: "经典 / 细节 / 故事感",

        image: "https://transsion-plattech-1219.oss-accelerate.aliyuncs.com/tranai-assets/ee26a13f2eb8412eb118ce86122018b0.jpeg"

        sceneDesc: "如果你是一种字体，你会出现在最需要效率和清晰度的地方。你的魅力不是装饰，而是把复杂信息整理得一目了然。",
        image: "https://transsion-plattech-1219.oss-accelerate.aliyuncs.com/tranai-assets/3a967ecbfa504056a16a5471477613ca.jpeg"
      },
      slab: {
        en: "SLAB SERIF",

        tags: "可靠 / 厚度 / 支撑感",
        desc: "你偏爱的字体往往有明显骨架和存在感，看起来稳、准、能托住内容。你会被那种扎实、有分量、不轻飘的视觉语言吸引。比起灵巧和花哨，你更认同一种有落点的力量。",

        short: "你拥有典型的未来审美，偏爱可变、灵活、适应性强的字体系统。",
        sceneName: "未来感交互界面、动态视觉系统，或 AI 生成设计实验页面",
        sceneDesc: "如果你是一种字体，你不会只活在一张海报上，而会出现在会响应、会变化、会进化的界面系统里。你代表的是一种更接近未来的字体想象。",
        image: "https://transsion-platform01.oss-accelerate.aliyuncs.com/tranai-assets/88bda60aadef42918eb4f1faee4f2e6c.jpeg"
      }
    };

    const priority = ["variable","serif","sans","slab","script","display"];
    let current = 0;
    let scores = {};
    let aiScore = 0;

    function initScores(){
      scores = {
        serif:0,
        sans:0,
        slab:0,
        script:0,
        display:0,
        variable:0
      };
      aiScore = 0;
    }

    function updateProgress(){
      const percent = Math.round((current / questions.length) * 100);
      document.getElementById("progressFill").style.width = percent + "%";
      document.getElementById("progressPercent").textContent = percent + "%";
      document.getElementById("progressText").textContent = `第 ${Math.min(current + 1, questions.length)} / ${questions.length} 题`;
    }

    function renderQuestion(){
      updateProgress();
      const q = questions[current];
      document.getElementById("questionBox").innerHTML = `
        <div class="q-no">Q${current + 1}</div>
        <h2 class="q-title">${q.title}</h2>
        <div class="options">
          ${q.options.map((opt, i) => `
            <div class="option" onclick="selectOption(${i})">
              <div class="opt-label">选项 ${opt.label}</div>
              <div class="opt-text">${opt.text}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function selectOption(index){
      const selected = questions[current].options[index];
      Object.keys(selected.add).forEach(key => {
        scores[key] += selected.add[key];
      });
      aiScore += selected.ai || 0;
      current++;
      if(current < questions.length){
        renderQuestion();
      } else {
        revealResult();
      }
    }

    function getSortedResults(){
      return Object.keys(scores).sort((a,b)=>{
        if(scores[b] !== scores[a]) return scores[b] - scores[a];
        return priority.indexOf(a) - priority.indexOf(b);
      });
    }

    function getAiAnalysis(score){
      if(score <= 3){
        return {
          level: "AI影响度：低",
          desc: "你的字体审美更偏向人文直觉与情绪感知。即使在数字界面和算法推荐高度统一的环境里，你依然更容易被温度、笔触、细节和阅读韵味打动。"
        };
      } else if(score <= 7){
        return {
          level: "AI影响度：中",
          desc: "你的字体审美同时保留了人文感和数字感。你既能欣赏有温度、有故事的字体，也会自然接受清晰、高效、适应屏幕的视觉表达。"
        };
      } else {
        return {
          level: "AI影响度：高",
          desc: "你的字体审美明显更接近数字界面时代的主流偏好。你会更自然地接受清晰、可变、适应性强、为多场景优化的字体系统，这也是 AI 时代最典型的审美方向之一。"
        };
      }
    }

    function getAiRecommendedFont(topKey, aiScore){
      const mapping = {
        serif: { high: "sans", mid: "variable", low: "script" },
        sans: { high: "variable", mid: "display", low: "serif" },
        slab: { high: "variable", mid: "sans", low: "serif" },
        script: { high: "display", mid: "serif", low: "sans" },
        display: { high: "variable", mid: "sans", low: "script" },
        variable: { high: "sans", mid: "display", low: "serif" }
      };

      let level = "mid";
      if(aiScore <= 3) level = "low";
      else if(aiScore >= 8) level = "high";

      const key = mapping[topKey][level];
      return {
        key,
        data: results[key]
      };
    }

    function getAiRecommendText(topKey, recommendKey, aiScore){
      const top = results[topKey];
      const rec = results[recommendKey];

      if(aiScore <= 3){
        return `你的天然偏好是「${top.en}」，而 AI 也许会温和地把你引向「${rec.en}」。这说明你虽然更偏爱有人味和细节的字体，但系统依然会尝试向你推荐更易传播、或更具情绪标签的风格。`;
      } else if(aiScore <= 7){
        return `你的天然偏好是「${top.en}」，而 AI 最可能进一步推荐你尝试「${rec.en}」。这说明你的审美本身就处在人文感与数字感之间，既能接受个性，也能接受系统化表达。`;
      } else {
        return `你的天然偏好是「${top.en}」，而 AI 几乎一定会继续把你推向「${rec.en}」。这说明你的审美已经非常适配数字平台与界面逻辑，更容易接受高效率、强适应性和高识别度的字体风格。`;
      }
    }

    function revealResult(){
      document.getElementById("quizPanel").style.display = "none";
      document.getElementById("resultSection").style.display = "block";

      const sorted = getSortedResults();
      const topKey = sorted[0];
      const subKey = sorted[1];
      const top = results[topKey];
      const sub = results[subKey];
      const aiAnalysis = getAiAnalysis(aiScore);
      const aiRecommend = getAiRecommendedFont(topKey, aiScore);
      const aiRecText = getAiRecommendText(topKey, aiRecommend.key, aiScore);

      document.getElementById("resultImage").src = top.image;
      document.getElementById("resultEn").textContent = "YOU ARE";
      document.getElementById("resultName").textContent = `${top.en}｜${top.name}`;
      document.getElementById("resultTags").textContent = top.tags;
      document.getElementById("resultDesc").textContent = top.desc;

      document.getElementById("subName").textContent = `${sub.en}｜${sub.name}`;
      document.getElementById("subDesc").textContent = sub.short;

      document.getElementById("shortComment").textContent =
        `你是「${top.en}｜${top.name}」，说明你最容易被 ${top.tags.replaceAll("/", " / ")} 这一类视觉特质吸引；而隐藏倾向「${sub.en}｜${sub.name}」则让你的字体审美在不同场景下更立体。`;

      document.getElementById("scoreList").innerHTML = sorted.map(key => {
        return `<div class="score-item"><strong>${results[key].en}</strong><br>${results[key].name}：${scores[key]} 分</div>`;
      }).join("");

      document.getElementById("aiLevel").textContent = aiAnalysis.level;
      document.getElementById("aiDesc").textContent = aiAnalysis.desc;
      document.getElementById("sceneName").textContent = top.sceneName;
      document.getElementById("sceneDesc").textContent = top.sceneDesc;
      document.getElementById("aiFontName").textContent = `${aiRecommend.data.en}｜${aiRecommend.data.name}`;
      document.getElementById("aiFontDesc").textContent = aiRecText;

      const share = `我测出来的本命字体是【${top.en}｜${top.name}】！
关键词：${top.tags}

我会出现的设计场景：
${top.sceneName}

我的隐藏倾向是【${sub.en}｜${sub.name}】。
${aiAnalysis.level}
AI推荐给我的第二字体是【${aiRecommend.data.en}｜${aiRecommend.data.name}】。

来测测你的本命字体：
${window.location.href}`;

      document.getElementById("shareText").textContent = share;

      setTimeout(() => {
        document.getElementById("revealText").textContent = "你的本命字体已揭晓";
        document.getElementById("flipCard").classList.add("flipped");
      }, 700);

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function restartQuiz(){
      current = 0;
      initScores();
      document.getElementById("quizPanel").style.display = "block";
      document.getElementById("resultSection").style.display = "none";
      document.getElementById("flipCard").classList.remove("flipped");
      document.getElementById("revealText").textContent = "正在揭晓你的本命字体……";
      renderQuestion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function copyShare(){
      navigator.clipboard.writeText(document.getElementById("shareText").textContent).then(()=>{
        alert("测试结果已复制");
      }).catch(()=>{
        alert("复制失败，请手动复制");
      });
    }

    function copyLink(){
      navigator.clipboard.writeText(window.location.href).then(()=>{
        alert("网页链接已复制");
      }).catch(()=>{
        alert("复制失败，请手动复制地址栏链接");
      });
    }

    initScores();
    renderQuestion();
  </script>
</body>
</html>
